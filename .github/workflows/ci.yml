name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Stage 1: Lint & Format ───────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff==0.15.1 mypy

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ganglion/ --ignore-missing-imports --strict

  # ── Stage 2: Security Scan ──────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pip-audit bandit

      - name: Dependency vulnerability scan
        run: pip-audit --require-hashes=false -r <(pip freeze) || true

      - name: Static analysis (bandit)
        run: bandit -r src/ganglion/ -c pyproject.toml || true

      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── Stage 3: Test ───────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=ganglion --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Stage 4: Build ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Build Docker image
        run: |
          docker build -t ganglion:${{ github.sha }} .
          docker tag ganglion:${{ github.sha }} ganglion:latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Stage 5: Deploy (main/release only) ─────────────────
  publish-skills:
    name: Publish Skills to ClawHub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Publish skills to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          pip install clawhub
          clawhub publish ./skills/ganglion/
          clawhub publish ./examples/synth-city/skill/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to staging
        run: echo "Deploy to staging — implement with your infrastructure"

      - name: Smoke tests
        run: echo "Run smoke tests against staging — implement with your infrastructure"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: production
      # Manual approval gate
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to production
        run: echo "Deploy to production — implement with your infrastructure"

      - name: Post-deploy health check
        run: echo "Health check — implement with your infrastructure"
